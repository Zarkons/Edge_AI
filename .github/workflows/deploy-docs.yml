name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz default-jre
          # Install PlantUML
          sudo wget -q https://github.com/plantuml/plantuml/releases/download/v1.2024.8/plantuml-1.2024.8.jar \
            -O /usr/local/lib/plantuml.jar
          printf '#!/bin/sh\nexec java -jar /usr/local/lib/plantuml.jar "$@"\n' \
            | sudo tee /usr/local/bin/plantuml > /dev/null
          sudo chmod +x /usr/local/bin/plantuml

      - name: Install Python doc dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx
          pip install -r docs/requirements_sphinx_3_11_lock.txt --no-deps
          pip install -r docs/requirements_sphinx_3_11.txt

      - name: Generate Doxygen XML
        run: |
          mkdir -p doxygen_xml
          doxygen - <<'EOF'
          PROJECT_NAME           = "EdgeAI"
          OUTPUT_DIRECTORY       = doxygen_xml
          INPUT                  = modules
          RECURSIVE              = YES
          FILE_PATTERNS          = *.h *.hpp *.cpp *.cc
          GENERATE_HTML          = NO
          GENERATE_XML           = YES
          XML_OUTPUT             = xml
          QUIET                  = YES
          EOF

      - name: Build Sphinx docs
        run: |
          mkdir -p docs/_static
          sphinx-build -b html docs docs/_build/html \
            -D "doxygen_xml_dir=$(pwd)/doxygen_xml/xml"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
